# Nome exibido na aba "Actions" do GitHub
name: CI/CD — Minha API

# QUANDO executar: a cada push na main
on:
  push:
    branches: [main]
  workflow_dispatch:   # permite rodar manualmente

jobs:

  # ─── JOB 1: Validar o contrato ───
  validar:
    runs-on: ubuntu-latest   # VM Linux gratuita

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Se o Spectral encontrar erros → pipeline PARA!
      - name: Validar OpenAPI com Spectral
        run: npx --yes @stoplight/spectral-cli@6 lint openapi.yaml

  # ─── JOB 2: Publicar documentação ───
  # Só roda se o job "validar" passou!
  publicar-docs:
    needs: validar
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Gerar HTML com Redoc
        run: |
          mkdir -p docs
          npx --yes @redocly/cli build-docs openapi.yaml --output docs/index.html

      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs